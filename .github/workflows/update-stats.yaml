name: Update README cards

env:
  WSLENV: ""
  WSL_UTF8: "1"
  
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Force Git Bash to the front of PATH
        shell: powershell
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_PAT_READ_REPO }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_PAT_READ_REPO }}

      - name: Generate pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=stats-organization&repo=github-readme-stats
          path: profile/pin-stats-organization-github-readme-stats.svg
          token: ${{ secrets.STATS_PAT_READ_REPO }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@://github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
